  </defs>

  <rect width="1200" height="1020" fill="#f4f0e6"/>
  <text x="40" y="46" class="heading">High-count readability comparison</text>
  <text x="40" y="72" class="small">Same terrain, positions, scale, factions, and facing spread in every column. Static visual evidence only.</text>

  <text x="212" y="116" text-anchor="middle" class="label">Tactical glyphs</text>
  <text x="552" y="116" text-anchor="middle" class="label">Heraldic tokens</text>
  <text x="892" y="116" text-anchor="middle" class="label">Abstract figures</text>

  <text x="35" y="252" class="label">Low</text>
  <g transform="translate(52 135)"><use href="#scene-bg"/><use href="#low-tactical"/></g>
  <g transform="translate(392 135)"><use href="#scene-bg"/><use href="#low-heraldic"/></g>
  <g transform="translate(732 135)"><use href="#scene-bg"/><use href="#low-figure"/></g>

  <text x="24" y="532" class="label">Medium</text>
  <g transform="translate(52 415)"><use href="#scene-bg"/><use href="#medium-tactical"/><circle cx="94" cy="99" r="15" fill="none" stroke="#ffd166" stroke-width="3"/></g>
  <g transform="translate(392 415)"><use href="#scene-bg"/><use href="#medium-heraldic"/><circle cx="94" cy="99" r="15" fill="none" stroke="#ffd166" stroke-width="3"/></g>
  <g transform="translate(732 415)"><use href="#scene-bg"/><use href="#medium-figure"/><circle cx="94" cy="99" r="15" fill="none" stroke="#ffd166" stroke-width="3"/></g>

  <text x="31" y="812" class="label">High</text>
  <g transform="translate(52 695)"><use href="#scene-bg"/><use href="#high-tactical"/><circle cx="100" cy="80" r="14" fill="none" stroke="#ffd166" stroke-width="3"/></g>
  <g transform="translate(392 695)"><use href="#scene-bg"/><use href="#high-heraldic"/><circle cx="100" cy="80" r="14" fill="none" stroke="#ffd166" stroke-width="3"/></g>
  <g transform="translate(732 695)"><use href="#scene-bg"/><use href="#high-figure"/><circle cx="100" cy="80" r="14" fill="none" stroke="#ffd166" stroke-width="3"/></g>

  <rect x="1080" y="135" width="88" height="780" rx="10" fill="#e8e1d2" stroke="#c8bfaa" stroke-width="2"/>
  <text x="1124" y="170" text-anchor="middle" class="label">Key</text>
  <circle cx="1100" cy="205" r="8" fill="#16697a" stroke="#182126" stroke-width="2"/><text x="1116" y="210" class="small">A</text>
  <path d="M1100 232 L1109 239 L1104 248 L1096 248 L1091 239 Z" fill="#b23a48" stroke="#182126" stroke-width="2"/><text x="1116" y="245" class="small">C</text>
  <circle cx="1100" cy="280" r="13" fill="none" stroke="#ffd166" stroke-width="3"/><text x="1116" y="285" class="small">Sel.</text>
  <text x="1124" y="330" text-anchor="middle" class="small">A = Azure</text>
  <text x="1124" y="352" text-anchor="middle" class="small">C = Crimson</text>
  <text x="1124" y="400" text-anchor="middle" class="small">30 units</text>
  <text x="1124" y="421" text-anchor="middle" class="small">in each</text>
  <text x="1124" y="442" text-anchor="middle" class="small">high panel</text>

  <text x="52" y="958" class="small">Observation prompt: can you read faction blocks, formation angle, facing, and the selected marker before inspecting individual role detail?</text>
  <text x="52" y="985" class="small">The comparison does not measure PixiJS, GPU, worker, message-size, or garbage-collection performance.</text>
</svg>
